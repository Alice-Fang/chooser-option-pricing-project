name: Data Pipeline

on:
  schedule:
    - cron: '0 9 * * *'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas
          pip install yfinance
          pip install fredapi

      - name: Run pipeline
        run: python pipeline.py
